name: Cloudflare Worker Deploy

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'cloudflare/worker/**'
      - 'wrangler.worker.jsonc'
      - 'package.json'
      - '.github/workflows/cloudflare-worker.yml'

permissions:
  contents: read

env:
  TWIS_DEPLOY_TARGET: cloudflare-worker

jobs:
  deploy-worker:
    runs-on: ubuntu-latest
    if: ${{ secrets.CLOUDFLARE_API_TOKEN != '' && secrets.CLOUDFLARE_ACCOUNT_ID != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        run: npm install
      - name: Contract check before deploy
        run: node tests/cloudflare_worker_contract_test.mjs
      - name: Deploy remote hull
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy -c wrangler.worker.jsonc
